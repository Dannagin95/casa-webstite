<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu thông tin bảo hành</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Urbanist:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/tracuubaohanh.css">
</head>
<body>

<main class="auth-wrapper">
    <div class="auth-card">
        
        <header class="auth-header">
            <div class="auth-logo">
                <img src="image/images/logoblack.png" alt="CASA Parquet">
            </div>
            <h1 class="auth-title">Hệ thống Bảo hành Điện tử</h1>
            <p class="auth-subtitle">Nhập thông tin để tra cứu chứng chỉ và thời hạn bảo hành.</p>
        </header>

        <form action="tinhtrangbaohanh.html" method="GET">
    <div class="form-group">
        <input type="text" name="id" placeholder="Order No. / Phone Number" required>
    </div>
    <button type="submit" class="btn-primary">
        Tra cứu
    </button>
</form>

        <div class="auth-divider">
            <span class="divider-text">Hoặc liên hệ hỗ trợ kỹ thuật</span>
        </div>

        <div class="auth-social-group">
            <a href="tel:1900xxxx" class="btn-social-outline">
                Hotline: (+84) 343931786
            </a>
        </div>

        <footer class="auth-card-footer">
            <p class="terms-text">
                Tìm hiểu thêm về <a href="baohanh.html">Chính sách bảo hành</a>
            </p>
        </footer>

    </div>

    <div class="auth-external-footer">
        <a href="index.html" class="footer-link">CASA</a>
    </div>
</main>
</body>
</html>
